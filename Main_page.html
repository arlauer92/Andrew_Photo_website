<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>Andrew Lauer Photography</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root{
--silver:#c0c0c0;
--bg:#000;
}

body{
margin:0;
background:var(--bg);
color:var(--silver);
font-family:Helvetica,Arial,sans-serif;
}

header{
text-align:center;
padding:40px 20px;
font-size:clamp(2rem,4vw,3rem);
font-weight:300;
letter-spacing:.1em;
}

/* FILTERS */

.filter-bar{
text-align:center;
margin-bottom:20px;
}

.filter-group{
margin:10px 0;
}

.filter-bar a{
margin:0 10px;
cursor:pointer;
text-decoration:underline;
color:var(--silver);
}

.filter-bar a:hover{ color:white; }

.filter-bar a.active{
color:white;
text-decoration:none;
border-bottom:1px solid white;
}

.hidden{display:none}

/* GALLERY */

main{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:24px;
}

.photo{
overflow:hidden;
cursor:pointer;
opacity:0;
transform:translateY(10px);
animation:fadeIn .6s ease forwards;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
transition:transform .4s ease;
}

.photo:hover img{
transform:scale(1.05);
}

@keyframes fadeIn{
to{
opacity:1;
transform:translateY(0);
}
}

/* GALLERY BUTTONS */

#galleryControls{
text-align:center;
margin:40px 0;
}

button{
background:none;
color:silver;
border:1px solid silver;
padding:10px 20px;
margin:5px;
cursor:pointer;
}

button:hover{
background:silver;
color:black;
}
