<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Andrew Lauer Photography</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:black;
color:silver;
font-family:Arial;
margin:0;
}

header{
text-align:center;
padding:40px;
font-size:36px;
}

nav{
text-align:center;
margin-bottom:10px;
}

nav a{
margin:0 10px;
cursor:pointer;
text-decoration:underline;
color:silver;
}

nav a.active{
color:white;
}

/* country filter row */
#countryFilters{
display:none;
margin-bottom:15px;
}

/* gallery CSS section */
/* main */
main{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
gap:20px;
}

/* square container */
.photo{
aspect-ratio:1 / 1;
background:black;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;   /* ⭐ critical */
}

/* image fits INSIDE square */
.photo img{
max-width:100%;
max-height:100%;
object-fit:contain;
display:block;     /* ⭐ prevents weird inline spacing */
}

/* lightbox */
.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
}

.lightbox.active{
display:flex;
}

.lightbox img{
max-width:90vw;
max-height:80vh;
object-fit:contain;
}

.caption{
margin-top:10px;
font-size:16px;
}

.photo{
transition:opacity 0.4s ease, transform 0.4s ease;
}

.photo.hide{
opacity:0;
transform:scale(0.95);
pointer-events:none;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
}
</style>

</head>

<body>

<header>Andrew Lauer Photography</header>

<!-- CONTINENTS -->

<nav id="continentFilters">
<a data-tag="Europe">Europe</a>
<a data-tag="Asia">Asia</a>
<a data-tag="NorthAmerica">North America</a>
<a data-tag="SouthAmerica">South America</a>
<a data-tag="Africa">Africa</a>
</nav>

<!-- COUNTRIES -->

<nav id="countryFilters"></nav>

<!-- TYPES -->

<nav id="typeFilters">
<a data-tag="Landscape">Landscape</a>
<a data-tag="Animals">Animals</a>
<a data-tag="Sports">Sports</a>
<a data-tag="Architecture">Architecture</a>
<a data-tag="Flowers">Flowers</a>
<a data-tag="Sunsets">Sunsets</a>
<a data-tag="Night">Night</a>
<a data-tag="Nature">Nature</a>
<a data-tag="Art">Art</a>
<a data-tag="Urban">Urban</a>
<a data-tag="Road">Road</a>
</nav>

<main id="gallery"></main>

<div id="typeToggleContainer" style="
position:fixed;
right:20px;
top:150px;
color:silver;
z-index:1000;
">
<label>
<input type="checkbox" id="typeToggle">
 Match ANY types
</label>
</div>

<div class="lightbox" id="lightbox">
<span class="close">✕</span>
<img>
<div class="caption"></div>
</div>

<script>

//////////////////////////////////////////////////////////////////////////
/////// This is the Javascript section ///////////////////////////////////
//////////////////////////////////////////////////////////////////////////

let photos = [];
let filteredPhotos = [];
let currentIndex = 0;
let visibleCount = 20;
let showAll = false;

let activeTags = [];
let locationTags = [];
let typeTags = [];
let matchAllTypes = true; // default

const gallery = document.getElementById("gallery");
const countryBar = document.getElementById("countryFilters");

// load data
fetch("./gallery.json")
.then(r => r.json())
.then(data => {

photos = data;
photos.sort(() => Math.random() - 0.5);

buildGallery(photos);

setupFilters();
setupLightbox();

});

// build gallery
function buildGallery(list){

gallery.innerHTML = "";

filteredPhotos = list;

let displayList = showAll ? list : list.slice(0, visibleCount);

displayList.forEach((p, i) => {

const div = document.createElement("div");
div.className = "photo";

div.innerHTML = `
<img src="thumbnails/${p.file}" data-index="${i}">
`;

gallery.appendChild(div);

});

// SHOW MORE BUTTONS
addShowButtons(list.length);

}

function addShowButtons(total){

// remove old buttons
document.getElementById("showControls")?.remove();

const container = document.createElement("div");
container.id = "showControls";
container.style.textAlign = "center";
container.style.padding = "20px";

if(!showAll && visibleCount < total){

const more = document.createElement("button");
more.textContent = "Show More";
more.onclick = () => {
visibleCount += 20;
buildGallery(filteredPhotos);
setupLightbox();
};

container.appendChild(more);

const all = document.createElement("button");
all.textContent = " Show All";
all.onclick = () => {
showAll = true;
buildGallery(filteredPhotos);
setupLightbox();
};

container.appendChild(all);

}

gallery.after(container);

}

// filters
function setupFilters(){

document.querySelectorAll("nav a").forEach(link => {

link.onclick = () => {

const tag = link.dataset.tag;

// determine type vs location
const isType = [
"Landscape","Animals","Sports","Architecture","Flowers",
"Sunsets","Night","Nature","Art","Urban","Road"
].includes(tag);

let targetArray = isType ? typeTags : locationTags;

if(targetArray.includes(tag)){
targetArray.splice(targetArray.indexOf(tag),1);
link.classList.remove("active");
} else {
targetArray.push(tag);
link.classList.add("active");
}

applyFilters();

};

});

}

// dynamic country filters
function updateCountries(continent){

const countries = new Set();

photos.forEach(p => {
if(p.tags.includes(continent)){
p.tags.forEach(t => {
if(t !== continent && !["Landscape","Animals","Sports","Architecture","Flowers","Sunsets","Night","Nature","Art","Urban","Road"].includes(t)){
countries.add(t);
}
});
}
});

countryBar.innerHTML = "";

if(countries.size === 0){
countryBar.style.display = "none";
return;
}

countryBar.style.display = "block";

countries.forEach(c => {

const a = document.createElement("a");
a.textContent = c;
a.dataset.tag = c;

a.onclick = () => {

if(activeTags.includes(c)){
activeTags = activeTags.filter(t => t !== c);
a.classList.remove("active");
} else {
activeTags.push(c);
a.classList.add("active");
}

applyFilters();

};

countryBar.appendChild(a);

});

}

//toggle logic
document.getElementById("typeToggle").onchange = (e) => {

matchAllTypes = !e.target.checked;

applyFilters();

};

// apply filters
function applyFilters(){

visibleCount = 20;
showAll = false;

const filtered = photos.filter(p => {

const tags = p.tags;

// --- LOCATION LOGIC (OR) ---
let locationMatch =
locationTags.length === 0 ||
locationTags.some(tag => tags.includes(tag));

// --- TYPE LOGIC ---
let typeMatch;

if(typeTags.length === 0){
typeMatch = true;
}
else if(matchAllTypes){
typeMatch = typeTags.every(tag => tags.includes(tag));
}
else{
typeMatch = typeTags.some(tag => tags.includes(tag));
}

// final decision
return locationMatch && typeMatch;

});

document.querySelectorAll(".photo").forEach(p => {
p.classList.add("hide");
});

setTimeout(() => {
buildGallery(filtered);
setupLightbox();
}, 200);

}

// lightbox
function setupLightbox(){

const lightbox = document.getElementById("lightbox");
const img = lightbox.querySelector("img");
const caption = lightbox.querySelector(".caption");

let startX = 0;

lightbox.addEventListener("touchstart", e => {
startX = e.touches[0].clientX;
});

lightbox.addEventListener("touchend", e => {

let endX = e.changedTouches[0].clientX;
let diff = startX - endX;

if(Math.abs(diff) > 50){
if(diff > 0){
currentIndex = (currentIndex + 1) % filteredPhotos.length;
} else {
currentIndex = (currentIndex - 1 + filteredPhotos.length) % filteredPhotos.length;
}
showImage();
}

});

document.querySelectorAll(".photo img").forEach(el => {

el.onclick = () => {

currentIndex = parseInt(el.dataset.index);

showImage();
lightbox.classList.add("active");

};

});

document.querySelector(".close").onclick = () => {
lightbox.classList.remove("active");
};

document.onkeydown = (e) => {

if(!lightbox.classList.contains("active")) return;

if(e.key === "ArrowRight") next();
if(e.key === "ArrowLeft") prev();
if(e.key === "Escape") lightbox.classList.remove("active");

};

function showImage(){

const p = filteredPhotos[currentIndex];

img.src = "images/" + p.file;
caption.textContent = p.caption || "";

}

document.onkeydown = (e) => {

if(!lightbox.classList.contains("active")) return;

if(e.key === "ArrowRight"){
currentIndex = (currentIndex + 1) % filteredPhotos.length;
showImage();
}

if(e.key === "ArrowLeft"){
currentIndex = (currentIndex - 1 + filteredPhotos.length) % filteredPhotos.length;
showImage();
}

if(e.key === "Escape"){
lightbox.classList.remove("active");
}

};

document.querySelector(".close").onclick = () => {
lightbox.classList.remove("active");
};

}
</script>

</body>
</html>
