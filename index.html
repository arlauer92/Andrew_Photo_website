<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Andrew Lauer Photography</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:black;
color:silver;
font-family:Arial;
margin:0;
}

header{
text-align:center;
padding:40px;
font-size:36px;
}

nav{
text-align:center;
margin-bottom:10px;
}

nav a{
margin:0 10px;
cursor:pointer;
text-decoration:underline;
color:silver;
}

nav a.active{
color:white;
}

/* country filter row */
#countryFilters{
display:none;
margin-bottom:15px;
}

/* gallery */
main{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
}

/* lightbox */
.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
}

.lightbox.active{
display:flex;
}

.lightbox img{
max-width:90vw;
max-height:80vh;
object-fit:contain;
}

.caption{
margin-top:10px;
font-size:16px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
}
</style>

</head>

<body>

<header>Andrew Lauer Photography</header>

<!-- CONTINENTS -->

<nav id="continentFilters">
<a data-tag="Europe">Europe</a>
<a data-tag="Asia">Asia</a>
<a data-tag="NorthAmerica">North America</a>
<a data-tag="SouthAmerica">South America</a>
<a data-tag="Africa">Africa</a>
</nav>

<!-- COUNTRIES -->

<nav id="countryFilters"></nav>

<!-- TYPES -->

<nav id="typeFilters">
<a data-tag="Landscape">Landscape</a>
<a data-tag="Animals">Animals</a>
<a data-tag="Sports">Sports</a>
<a data-tag="Architecture">Architecture</a>
<a data-tag="Flowers">Flowers</a>
<a data-tag="Sunsets">Sunsets</a>
<a data-tag="Night">Night</a>
<a data-tag="Nature">Nature</a>
<a data-tag="Art">Art</a>
<a data-tag="Urban">Urban</a>
<a data-tag="Road">Road</a>
</nav>

<main id="gallery"></main>

<div class="lightbox" id="lightbox">
<span class="close">✕</span>
<img>
<div class="caption"></div>
</div>

<script>

let photos = [];
let filteredPhotos = [];
let currentIndex = 0;

let activeTags = [];

const gallery = document.getElementById("gallery");
const countryBar = document.getElementById("countryFilters");

// load data
fetch("./gallery.json")
.then(r => r.json())
.then(data => {

photos = data;
photos.sort(() => Math.random() - 0.5);

buildGallery(photos);

setupFilters();
setupLightbox();

});

// build gallery
function buildGallery(list){

gallery.innerHTML = "";

list.forEach((p, i) => {

const div = document.createElement("div");
div.className = "photo";

div.innerHTML = `
<img src="thumbnails/${p.file}" data-index="${i}">
`;

gallery.appendChild(div);

});

filteredPhotos = list;

}

// filters
function setupFilters(){

document.querySelectorAll("nav a").forEach(link => {

link.onclick = () => {

const tag = link.dataset.tag;

if(activeTags.includes(tag)){
activeTags = activeTags.filter(t => t !== tag);
link.classList.remove("active");
} else {
activeTags.push(tag);
link.classList.add("active");
}

updateCountries(tag);
applyFilters();

};

});

}

// dynamic country filters
function updateCountries(continent){

const countries = new Set();

photos.forEach(p => {
if(p.tags.includes(continent)){
p.tags.forEach(t => {
if(t !== continent && !["Landscape","Animals","Sports","Architecture","Flowers","Sunsets","Night","Nature","Art","Urban","Road"].includes(t)){
countries.add(t);
}
});
}
});

countryBar.innerHTML = "";

if(countries.size === 0){
countryBar.style.display = "none";
return;
}

countryBar.style.display = "block";

countries.forEach(c => {

const a = document.createElement("a");
a.textContent = c;
a.dataset.tag = c;

a.onclick = () => {

if(activeTags.includes(c)){
activeTags = activeTags.filter(t => t !== c);
a.classList.remove("active");
} else {
activeTags.push(c);
a.classList.add("active");
}

applyFilters();

};

countryBar.appendChild(a);

});

}

// apply filters
function applyFilters(){

const filtered = photos.filter(p => {
return activeTags.every(tag => p.tags.includes(tag));
});

buildGallery(filtered);
setupLightbox();

}

// lightbox
function setupLightbox(){

const lightbox = document.getElementById("lightbox");
const img = lightbox.querySelector("img");
const caption = lightbox.querySelector(".caption");

document.querySelectorAll(".photo img").forEach(el => {

el.onclick = () => {

currentIndex = parseInt(el.dataset.index);

showImage();
lightbox.classList.add("active");

};

});

document.querySelector(".close").onclick = () => {
lightbox.classList.remove("active");
};

document.onkeydown = (e) => {

if(!lightbox.classList.contains("active")) return;

if(e.key === "ArrowRight") next();
if(e.key === "ArrowLeft") prev();
if(e.key === "Escape") lightbox.classList.remove("active");

};

function showImage(){

const p = filteredPhotos[currentIndex];

img.src = "images/" + p.file;
caption.textContent = p.caption || "";

}

function next(){
currentIndex = (currentIndex + 1) % filteredPhotos.length;
showImage();
}

function prev(){
currentIndex = (currentIndex - 1 + filteredPhotos.length) % filteredPhotos.length;
showImage();
}

}

</script>

</body>
</html>
