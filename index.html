<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Andrew Lauer Photography</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:black;
color:silver;
font-family:Arial, sans-serif;
margin:0;
}

header{
text-align:center;
padding:40px;
font-size:36px;
letter-spacing:2px;
}

/* FILTERS */
nav{
text-align:center;
margin-bottom:15px;
}

nav a{
margin:0 10px;
cursor:pointer;
text-decoration:underline;
color:silver;
}

nav a.active{
color:white;
}

/* GALLERY */
main{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
transition:transform .3s;
}

.photo img:hover{
transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
}

.lightbox.active{
display:flex;
}

.lightbox img{
max-width:95vw;
max-height:90vh;
object-fit:contain;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:30px;
cursor:pointer;
}
</style>

</head>

<body>

<header>Andrew Lauer Photography</header>

<!-- CONTINENT FILTERS -->

<nav>
<a data-tag="Europe">Europe</a>
<a data-tag="Asia">Asia</a>
<a data-tag="NorthAmerica">North America</a>
<a data-tag="SouthAmerica">South America</a>
<a data-tag="Africa">Africa</a>
<a data-tag="Australia">Australia</a>
</nav>

<!-- TYPE FILTERS -->

<nav>
<a data-tag="Landscape">Landscape</a>
<a data-tag="Animals">Animals</a>
<a data-tag="Sports">Sports</a>
<a data-tag="Architecture">Architecture</a>
<a data-tag="Flowers">Flowers</a>
<a data-tag="Sunsets">Sunsets</a>
<a data-tag="Night">Night</a>
<a data-tag="Nature">Nature</a>
<a data-tag="Art">Art</a>
<a data-tag="Urban">Urban</a>
<a data-tag="Road">Road</a>
</nav>

<main id="gallery"></main>

<div class="lightbox" id="lightbox">
<span class="close">✕</span>
<img src="">
</div>

<script>

const gallery = document.getElementById("gallery");
let activeTags = [];

// LOAD JSON
fetch("gallery.json")
.then(res => res.json())
.then(data => {

console.log("Loaded photos:", data); // DEBUG

// random order
data.sort(() => Math.random() - 0.5);

data.forEach(photo => {

const div = document.createElement("div");
div.className = "photo";
div.dataset.tags = photo.tags.join(" ");

div.innerHTML = `
<img src="thumbnails/${photo.file}" data-full="images/${photo.file}">
`;

gallery.appendChild(div);

});

setupFilters();
setupLightbox();

})
.catch(err => {
console.error("ERROR LOADING JSON:", err);
});

// FILTERS
function setupFilters(){

document.querySelectorAll("nav a").forEach(link => {

link.onclick = () => {

const tag = link.dataset.tag;

if(activeTags.includes(tag)){
activeTags = activeTags.filter(t => t !== tag);
link.classList.remove("active");
} else {
activeTags.push(tag);
link.classList.add("active");
}

applyFilters();

};

});

}

function applyFilters(){

document.querySelectorAll(".photo").forEach(photo => {

const tags = photo.dataset.tags.split(" ");

const match = activeTags.every(t => tags.includes(t));

photo.style.display =
(activeTags.length === 0 || match) ? "block" : "none";

});

}

// LIGHTBOX
function setupLightbox(){

const lightbox = document.getElementById("lightbox");
const img = lightbox.querySelector("img");

document.querySelectorAll(".photo img").forEach(image => {

image.onclick = () => {
img.src = image.dataset.full;
lightbox.classList.add("active");
};

});

document.querySelector(".close").onclick = () => {
lightbox.classList.remove("active");
};

document.addEventListener("keydown", e => {
if(e.key === "Escape"){
lightbox.classList.remove("active");
}
});

}

</script>

</body>
</html>
