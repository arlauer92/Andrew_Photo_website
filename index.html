<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Andrew Lauer Photography</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:black;color:silver;font-family:Arial;margin:0}
header{text-align:center;padding:40px;font-size:36px}

/* filters */
nav{text-align:center;margin:10px}
nav a{margin:0 10px;cursor:pointer;text-decoration:underline;color:silver}
nav a.active{color:white}

/* toggle */
#typeToggleContainer{
position:fixed;right:20px;top:150px;z-index:10
}

/* country filter row */
#countryFilters{
display:none;
margin-bottom:15px;
}

/* gallery CSS section */
/* main */
main{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

/* square container */
.photo{
aspect-ratio:1/1;
background:black;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
transition:opacity .3s, transform .3s;
}

/* image fits INSIDE square with blur effect */
.photo img{
max-width:100%;
max-height:100%;
object-fit:contain;
display:block;
filter:blur(8px);
transition:filter .5s;
}

/* becomes sharp after load */
.photo img.loaded{filter:blur(0)}

/* lightbox CSS section */
/* lightbox */
.lightbox{
position:fixed;inset:0;
background:rgba(0,0,0,.95);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:1000;
}

.lightbox.active ~ #typeToggleContainer{
display:none;
}

.lightbox img{
max-width:90vw;
max-height:80vh;
object-fit:contain;
opacity:0;
transition:opacity .4s;
}

.lightbox img.visible{opacity:1}

.caption{margin-top:10px}

.close{
position:absolute;top:20px;right:30px;
font-size:30px;cursor:pointer;
}

/* loader */
.loader{
width:40px;height:40px;
border:4px solid #555;
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}
</style>

</head>

<body>

<header>Andrew Lauer Photography</header>

<!-- CONTINENTS -->

<nav id="continentFilters">
<a data-tag="Europe">Europe</a>
<a data-tag="Asia">Asia</a>
<a data-tag="NorthAmerica">North America</a>
<a data-tag="SouthAmerica">South America</a>
<a data-tag="Africa">Africa</a>
</nav>

<!-- COUNTRIES -->

<nav id="countryFilters"></nav>

<!-- TYPES -->

<nav id="typeFilters">
<a data-tag="Landscape">Landscape</a>
<a data-tag="Animals">Animals</a>
<a data-tag="Sports">Sports</a>
<a data-tag="Architecture">Architecture</a>
<a data-tag="Flowers">Flowers</a>
<a data-tag="Sunsets">Sunsets</a>
<a data-tag="Night">Night</a>
<a data-tag="Nature">Nature</a>
<a data-tag="Art">Art</a>
<a data-tag="Urban">Urban</a>
<a data-tag="Road">Road</a>
</nav>

<!-- CLEAR -->

<div style="text-align:center">
<button id="clearFilters">Clear Filters</button>
</div>

<!-- TOGGLE -->

<div id="typeToggleContainer">
<label>
<input type="checkbox" id="typeToggle">
 Match ANY types
</label>
</div>

<main id="gallery"></main>

<div class="lightbox" id="lightbox">
<span class="close">✕</span>
<div class="loader"></div>
<img>
<div class="caption"></div>
</div>

<script>

let photos = [];
let filteredPhotos = [];

let locationTags = [];
let typeTags = [];
let matchAllTypes = true;

let visibleCount = 20;
let showAll = false;
let currentIndex = 0;

const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const toggle = document.getElementById("typeToggleContainer");

/* LOAD */
fetch("./gallery.json")
.then(r => r.json())
.then(data => {

photos = data;
photos.sort(()=>Math.random()-0.5);

buildGallery(photos);
lazyLoad();
setupLightbox();
setupFilters();

});

/* BUILD */
function buildGallery(list){

gallery.innerHTML="";
filteredPhotos=list;

let display = showAll ? list : list.slice(0,visibleCount);

display.forEach((p,i)=>{
const div=document.createElement("div");
div.className="photo";
div.innerHTML=`<img data-src="thumbnails/${p.file}" data-index="${i}" class="lazy">`;
gallery.appendChild(div);
});

addShowButtons(list.length);

}

/* SHOW MORE */
function addShowButtons(total){

document.getElementById("controls")?.remove();

if(showAll || total<=visibleCount) return;

const c=document.createElement("div");
c.id="controls";
c.style.textAlign="center";

const more=document.createElement("button");
more.textContent="Show More";
more.onclick=()=>{
visibleCount+=20;
buildGallery(filteredPhotos);
lazyLoad();
setupLightbox();
};

const all=document.createElement("button");
all.textContent=" Show All";
all.onclick=()=>{
showAll=true;
buildGallery(filteredPhotos);
lazyLoad();
setupLightbox();
};

c.appendChild(more);
c.appendChild(all);

gallery.after(c);

}

/* FILTERS */
function setupFilters(){

document.querySelectorAll("nav a").forEach(a=>{
a.onclick=()=>{

const tag=a.dataset.tag;

const isType=[
"Landscape","Animals","Sports","Architecture","Flowers",
"Sunsets","Night","Nature","Art","Urban","Road"
].includes(tag);

let arr=isType?typeTags:locationTags;

if(arr.includes(tag)){
arr.splice(arr.indexOf(tag),1);
a.classList.remove("active");
}else{
arr.push(tag);
a.classList.add("active");
}

updateCountries(tag);
applyFilters();

};
});

/* toggle */
document.getElementById("typeToggle").onchange=(e)=>{
matchAllTypes=!e.target.checked;
applyFilters();
};

/* clear */
document.getElementById("clearFilters").onclick=()=>{
locationTags=[];
typeTags=[];
document.querySelectorAll("nav a").forEach(a=>a.classList.remove("active"));
document.getElementById("countryFilters").style.display="none";
visibleCount=20;
showAll=false;
applyFilters();
};

}

/* APPLY */
function applyFilters(){

const filtered=photos.filter(p=>{

const tags=p.tags||[];

let loc=locationTags.length===0 || locationTags.some(t=>tags.includes(t));

let type=typeTags.length===0 || (
matchAllTypes
? typeTags.every(t=>tags.includes(t))
: typeTags.some(t=>tags.includes(t))
);

return loc && type;

});

visibleCount=20;
showAll=false;

buildGallery(filtered);
lazyLoad();
setupLightbox();

}

/* COUNTRIES */
function updateCountries(continent){

const bar=document.getElementById("countryFilters");
const set=new Set();

photos.forEach(p=>{
if(p.tags.includes(continent)){
p.tags.forEach(t=>{
if(t!==continent && !typeTags.includes(t)) set.add(t);
});
}
});

bar.innerHTML="";
if(set.size===0){bar.style.display="none";return;}
bar.style.display="block";

set.forEach(c=>{
const a=document.createElement("a");
a.textContent=c;
a.dataset.tag=c;
a.onclick=()=>{
if(locationTags.includes(c)){
locationTags.splice(locationTags.indexOf(c),1);
a.classList.remove("active");
}else{
locationTags.push(c);
a.classList.add("active");
}
applyFilters();
};
bar.appendChild(a);
});

}

/* LAZY */
function lazyLoad(){

const obs=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){
const img=e.target;
img.src=img.dataset.src;
img.onload=()=>img.classList.add("loaded");
obs.unobserve(img);
}
});
});

document.querySelectorAll("img.lazy").forEach(i=>obs.observe(i));

}

/* LIGHTBOX */
function setupLightbox(){

document.querySelectorAll(".photo img").forEach(el=>{
el.onclick=()=>{
currentIndex=parseInt(el.dataset.index);
showImage();
lightbox.classList.add("active");
toggle.style.display="none";
};
});

document.querySelector(".close").onclick=closeLightbox;

document.onkeydown=e=>{
if(!lightbox.classList.contains("active")) return;

if(e.key==="ArrowRight") next();
if(e.key==="ArrowLeft") prev();
if(e.key==="Escape") closeLightbox();
};

let startX=0;
lightbox.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
lightbox.addEventListener("touchend",e=>{
let diff=startX-e.changedTouches[0].clientX;
if(Math.abs(diff)>50){
diff>0?next():prev();
}
});

}

function closeLightbox(){
lightbox.classList.remove("active");
toggle.style.display="block";
}

function showImage(){

const p=filteredPhotos[currentIndex];
const img=lightbox.querySelector("img");
const loader=document.querySelector(".loader");
const caption=document.querySelector(".caption");

loader.style.display="block";
img.classList.remove("visible");

const temp=new Image();
temp.src="images/"+p.file;

temp.onload=()=>{
img.src=temp.src;
caption.textContent=p.caption||"";
loader.style.display="none";
img.classList.add("visible");
preload();
};

}

function preload(){
[new Image().src="images/"+filteredPhotos[(currentIndex+1)%filteredPhotos.length].file,
 new Image().src="images/"+filteredPhotos[(currentIndex-1+filteredPhotos.length)%filteredPhotos.length].file];
}

function next(){
currentIndex=(currentIndex+1)%filteredPhotos.length;
showImage();
}

function prev(){
currentIndex=(currentIndex-1+filteredPhotos.length)%filteredPhotos.length;
showImage();
}

</script>

</body>
</html>
